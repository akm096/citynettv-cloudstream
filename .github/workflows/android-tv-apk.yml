name: Android TV APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android TV APK
        run: |
          chmod +x gradlew
          ./gradlew :CityNetTVAndroidTV:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CityNetTV-AndroidTV-debug-apk
          path: CityNetTVAndroidTV/build/outputs/apk/debug/*.apk
